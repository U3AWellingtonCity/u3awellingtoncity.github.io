<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>U3A Calendar Link Generator</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      max-width: 700px;
      line-height: 1.6;
    }
    label {
      font-weight: bold;
      margin-top: 15px;
      display: block;
    }
    input, textarea {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      font-size: 1rem;
    }
    button {
      margin-top: 20px;
      padding: 10px 15px;
      font-size: 1rem;
      cursor: pointer;
    }
    .output {
      margin-top: 30px;
      padding: 15px;
      background: #f3f3f3;
      border-radius: 6px;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

  <h2>U3A Lecture – Calendar Link Generator</h2>

  <label>Lecture Title</label>
  <input id="title" placeholder="e.g., Hollywood and Beyond" />

  <label>Speaker</label>
  <input id="speaker" placeholder="e.g., Dame Miranda Harcourt and Stuart McKenzie" />

  <label>Date (YYYY-MM-DD)</label>
  <input id="date" placeholder="2026-08-14" />

  <label>Start Time (24h, NZ time)</label>
  <input id="start" placeholder="10:30" />

  <label>End Time (24h, NZ time)</label>
  <input id="end" placeholder="12:00" />

  <label>Description</label>
  <textarea id="description" rows="4" placeholder="Optional description"></textarea>

  <button onclick="generate()">Generate Calendar
