<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>U3A Calendar Link Generator</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      max-width: 700px;
      line-height: 1.6;
    }
    label {
      font-weight: bold;
      margin-top: 15px;
      display: block;
    }
    input, textarea {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      font-size: 1rem;
    }
    button {
      margin-top: 20px;
      padding: 10px 15px;
      font-size: 1rem;
      cursor: pointer;
    }
    .output {
      margin-top: 30px;
      padding: 15px;
      background: #f3f3f3;
      border-radius: 6px;
    }
    .output textarea {
      width: 100%;
      height: 140px;
      margin-top: 10px;
      font-family: monospace;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>

  <h2>U3A Lecture – Calendar Link Generator</h2>

  <label>Lecture Title</label>
  <input id="title" placeholder="e.g., Hollywood and Beyond" />

  <label>Speaker</label>
  <input id="speaker" placeholder="e.g., Dame Miranda Harcourt and Stuart McKenzie" />

  <label>Date (YYYY-MM-DD)</label>
  <input id="date" placeholder="2026-08-14" />

  <label>Start Time (24h, NZ time)</label>
  <input id="start" placeholder="10:30" />

  <label>End Time (24h, NZ time)</label>
  <input id="end" placeholder="12:00" />

  <label>Description</label>
  <textarea id="description" rows="4" placeholder="Optional description"></textarea>

  <button onclick="generate()">Generate Calendar Links</button>

  <div id="output" class="output"></div>

  <script>
    function generate() {
      const title = document.getElementById("title").value.trim();
      const speaker = document.getElementById("speaker").value.trim();
      const date = document.getElementById("date").value.trim();
      const startTime = document.getElementById("start").value.trim();
      const endTime = document.getElementById("end").value.trim();
      const description = document.getElementById("description").value.trim();

      if (!title || !speaker || !date || !startTime || !endTime) {
        alert("Please fill in all required fields.");
        return;
      }

      // Event title with U3A prefix and speaker
      const eventTitle = `U3A – ${title} (${speaker})`;

      // Build start/end in UTC for Google Calendar
      const start = new Date(`${date}T${startTime}:00+12:00`)
        .toISOString()
        .replace(/[-:]/g, "")
        .replace(".000Z", "Z");

      const end = new Date(`${date}T${endTime}:00+12:00`)
        .toISOString()
        .replace(/[-:]/g, "")
        .replace(".000Z", "Z");

      // Google Calendar URL
      const googleUrl =
        "https://calendar.google.com/calendar/render?action=TEMPLATE" +
        `&text=${encodeURIComponent(eventTitle)}` +
        `&dates=${start}/${end}` +
        `&location=${encodeURIComponent("The Embassy Theatre, 10 Kent Terrace")}` +
        `&details=${encodeURIComponent(description)}`;

      // ICS content
      const icsContent =
        "BEGIN:VCALENDAR\n" +
        "VERSION:2.0\n" +
        "BEGIN:VEVENT\n" +
        `SUMMARY:${eventTitle}\n` +
        `DTSTART:${start}\n` +
        `DTEND:${end}\n` +
        "LOCATION:The Embassy Theatre, 10 Kent Terrace\n" +
        `DESCRIPTION:${description}\n` +
        "END:VEVENT\n" +
        "END:VCALENDAR";

      // Data URL for download
      const icsBase64 = btoa(unescape(encodeURIComponent(icsContent)));
      const icsHref = `data:text/calendar;base64,${icsBase64}`;

      // Email snippet for you to copy
      const emailSnippet =
`Add to your calendar:
• Google Calendar: ${googleUrl}
• Other calendars: please use the attached file "u3a-lecture.ics"`;

      document.getElementById("output").innerHTML =
        `<strong>Test the Google Calendar link:</strong><br>` +
        `<a href="${googleUrl}" target="_blank" rel="noopener">Open in Google Calendar</a><br><br>` +
        `<strong>Download ICS file to attach to your email:</strong><br>` +
        `<a download="u3a-lecture.ics" href="${icsHref}">Download u3a-lecture.ics</a><br><br>` +
        `<strong>Email snippet (copy this into your weekly email):</strong><br>` +
        `<textarea readonly>${emailSnippet}</textarea>`;
    }
  </script>

</body>
</html>
