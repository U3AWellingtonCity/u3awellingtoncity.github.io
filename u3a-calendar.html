<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>U3A Universal Calendar Generator</title>
<style>
body { font-family: Arial, sans-serif; margin: 40px; max-width: 750px; }
header {
    background: #003366;
    color: white;
    padding: 15px 20px;
    margin: -40px -40px 30px -40px;
}
header h1 {
    margin: 0;
    font-size: 1.8em;
}
header p {
    margin: 5px 0 0 0;
    font-size: 1em;
}
input { width: 100%; padding: 8px; margin: 6px 0; }
.output { margin-top: 20px; padding: 10px; background: #f0f0f0; }
a { display: block; margin: 8px 0; font-size: 1.1em; }
</style>
</head>
<body>

<header>
    <h1>U3A Wellington City</h1>
    <p>Universal Calendar Generator</p>
</header>

<form id="form">

<label>Title:</label>
<input id="title">

<label>Speaker:</label>
<input id="speaker">

<label>Date (YYYY-MM-DD):</label>
<input id="date">

<label>Start time (HH:MM):</label>
<input id="start">

<label>End time (HH:MM):</label>
<input id="end">

<label>Venue:</label>
<input id="venue" value="The Embassy Theatre, 10 Kent Terrace">

</form>

<hr>

<div class="output">
<h3>Add to your calendar</h3>

<a id="google" href="#" target="_blank">➤ Add to Google Calendar</a>
<a id="outlook" href="#" target="_blank">➤ Add to Outlook / Office 365</a>
<a id="yahoo" href="#" target="_blank">➤ Add to Yahoo Calendar</a>
<a id="icsDownload" href="#" download="event.ics">➤ Download ICS file (Apple / Android / Desktop)</a>

</div>

<script>
// Read URL parameters
const params = new URLSearchParams(window.location.search);

function set(id) {
    const el = document.getElementById(id);
    if (params.has(id)) el.value = params.get(id);
}

["title", "speaker", "date", "start", "end", "venue"].forEach(set);

// Build links
function updateLinks() {
    const title = encodeURIComponent(document.getElementById("title").value);
    const speaker = encodeURIComponent(document.getElementById("speaker").value);
    const date = document.getElementById("date").value;
    const start = document.getElementById("start").value;
    const end = document.getElementById("end").value;
    const venue = encodeURIComponent(document.getElementById("venue").value);

    if (!date || !start || !end) return;

    const startLocal = `${date}T${start}`;
    const endLocal = `${date}T${end}`;

    const startUTC = new Date(startLocal).toISOString().replace(/[-:]/g, "").replace(/\.\d+Z/, "Z");
    const endUTC = new Date(endLocal).toISOString().replace(/[-:]/g, "").replace(/\.\d+Z/, "Z");

    document.getElementById("google").href =
        `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${startUTC}/${endUTC}&details=Speaker:%20${speaker}&location=${venue}`;

    document.getElementById("outlook").href =
        `https://outlook.live.com/calendar/0/deeplink/compose?subject=${title}&body=Speaker:%20${speaker}&location=${venue}&startdt=${startLocal}&enddt=${endLocal}`;

    document.getElementById("yahoo").href =
        `https://calendar.yahoo.com/?v=60&view=d&type=20&title=${title}&st=${startUTC}&et=${endUTC}&desc=Speaker:%20${speaker}&in_loc=${venue}`;

    const ics =
`BEGIN:VCALENDAR
VERSION:2.0
BEGIN:VEVENT
SUMMARY:${decodeURIComponent(title)}
DTSTART:${startUTC}
DTEND:${endUTC}
LOCATION:${decodeURIComponent(venue)}
DESCRIPTION:Speaker: ${decodeURIComponent(speaker)}
END:VEVENT
END:VCALENDAR`;

    const blob = new Blob([ics], { type: "text/calendar" });
    const url = URL.createObjectURL(blob);

    document.getElementById("icsDownload").href = url;
    document.getElementById("icsDownload").download =
        `${decodeURIComponent(title).replace(/[^a-z0-9]/gi,'_')}.ics`;
}

updateLinks();
</script>

</body>
</html>
