<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>U3A Lecture Parser</title>
<style>
  body { font-family: Arial, sans-serif; margin: 40px; max-width: 700px; }
  textarea, input { width: 100%; padding: 8px; margin-top: 10px; }
  button { padding: 10px 15px; margin-top: 15px; cursor: pointer; }
  .output { margin-top: 25px; padding: 15px; background: #f3f3f3; border-radius: 6px; }
  .output textarea { width: 100%; height: 140px; font-family: monospace; }
</style>
</head>

<body>

<h2>U3A Lecture Parser</h2>

<p>Paste the top lines of the lecture description here:</p>

<textarea id="input" rows="6" placeholder="e.g.
Navigating disruption, trust, technology and human rights in a changing world
Dr Stephen Rainbow
Tuesday 23 June, 10.30–11.45am"></textarea>

<button onclick="parse()">Generate Calendar Links</button>

<div id="output" class="output"></div>

<script>
function parse() {
  const text = document.getElementById("input").value.trim();
  if (!text) { alert("Please paste the lecture header."); return; }

  const lines = text.split("\n").map(l => l.trim()).filter(l => l);

  const title = lines[0];
  const speaker = lines[1];

  // Extract date + time from line 3
  const dateLine = lines[2];

  // Date
  const dateMatch = dateLine.match(/(\d{1,2})\s+([A-Za-z]+)\s*,?\s*(\d{4})?/);
  const day = dateMatch[1];
  const monthName = dateMatch[2];
  const year = dateMatch[3] || new Date().getFullYear();

  const monthIndex = {
    January:1, February:2, March:3, April:4, May:5, June:6,
    July:7, August:8, September:9, October:10, November:11, December:12
  }[monthName];

  const date = `${year}-${String(monthIndex).padStart(2,"0")}-${String(day).padStart(2,"0")}`;

  // Time
 const timeMatch = dateLine.match(/(\d{1,2}[:\.]\d{2})\s*[\u002D\u2010-\u2015]\s*(\d{1,2}[:\.]\d{2})/);
  const startTime = timeMatch[1].replace(".", ":");
  const endTime = timeMatch[2].replace(".", ":");

  // Build event title
  const eventTitle = `U3A – ${title} (${speaker})`;

  // Convert to UTC for Google Calendar
  const startUTC = new Date(`${date}T${startTime}:00+12:00`)
      .toISOString().replace(/[-:]/g,"").replace(".000Z","Z");

  const endUTC = new Date(`${date}T${endTime}:00+12:00`)
      .toISOString().replace(/[-:]/g,"").replace(".000Z","Z");

  // Google Calendar link
  const googleUrl =
    "https://calendar.google.com/calendar/render?action=TEMPLATE" +
    `&text=${encodeURIComponent(eventTitle)}` +
    `&dates=${startUTC}/${endUTC}` +
    `&location=${encodeURIComponent("The Embassy Theatre, 10 Kent Terrace")}`;

  // ICS file
  const ics =
    "BEGIN:VCALENDAR\n" +
    "VERSION:2.0\n" +
    "BEGIN:VEVENT\n" +
    `SUMMARY:${eventTitle}\n` +
    `DTSTART:${startUTC}\n` +
    `DTEND:${endUTC}\n` +
    "LOCATION:The Embassy Theatre, 10 Kent Terrace\n" +
    "END:VEVENT\n" +
    "END:VCALENDAR";

  const icsBase64 = btoa(unescape(encodeURIComponent(ics)));
  const icsHref = `data:text/calendar;base64,${icsBase64}`;

  const emailSnippet =
`Add to your calendar:
• Google Calendar: ${googleUrl}
• Other calendars: please use the attached file "u3a-lecture.ics"`;

  document.getElementById("output").innerHTML =
    `<strong>Google Calendar link:</strong><br>
     <a href="${googleUrl}" target="_blank">Open in Google Calendar</a><br><br>

     <strong>Download ICS file:</strong><br>
     <a download="u3a-lecture.ics" href="${icsHref}">Download u3a-lecture.ics</a><br><br>

     <strong>Email snippet:</strong><br>
     <textarea readonly>${emailSnippet}</textarea>`;
}
</script>

</body>
</html>
