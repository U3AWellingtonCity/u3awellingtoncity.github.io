<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>U3A Lecture Parser</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 40px;
        max-width: 700px;
        line-height: 1.6;
        font-size: 18px;
    }
    textarea {
        width: 100%;
        font-size: 17px;
        padding: 8px;
    }
    .link {
        font-size: 22px;
        font-weight: bold;
        margin: 12px 0;
        display: block;
    }
    .small {
        font-size: 16px;
        margin-top: 20px;
    }
</style>
</head>

<body>
<h2>U3A Lecture Parser</h2>
<p>Paste the lecture header here:</p>

<textarea id="input" rows="10" placeholder="Tuesday 23 June 2026
10:30 - 11:45

Lecture title
Speaker name"></textarea>

<br><br>
<button onclick="parse()" style="font-size:18px;padding:10px 20px;">Generate Calendar Links</button>

<div id="output" style="margin-top:30px;"></div>

<script>
function parse() {
    const input = document.getElementById("input").value;

    const rawLines = input.split('\n').map(l => l.trim());

    const dateLine = rawLines.find(l => l !== '');
    const timeLine = rawLines.slice(rawLines.indexOf(dateLine) + 1).find(l => l !== '');
    const title = rawLines.slice(rawLines.indexOf(timeLine) + 1).find(l => l !== '');
    const speaker = rawLines.slice(rawLines.indexOf(title) + 1).find(l => l !== '');

    const fullTitle = "U3A – " + title;

    const dateMatch = dateLine.match(/(\d{1,2})\s+([A-Za-z]+)\s+(\d{4})/);
    if (!dateMatch) {
        document.getElementById("output").innerHTML = "<p style='color:red;'>Could not read the date line.</p>";
        return;
    }

    const day = dateMatch[1];
    const monthName = dateMatch[2];
    const year = dateMatch[3];

    const monthMap = {
        January:0, February:1, March:2, April:3, May:4, June:5,
        July:6, August:7, September:8, October:9, November:10, December:11
    };

    const month = monthMap[monthName];

    const timeMatch = timeLine.match(/(\d{1,2}[:\.]\d{2})\s*[\u002D\u2010-\u2015]\s*(\d{1,2}[:\.]\d{2})/);
    if (!timeMatch) {
        document.getElementById("output").innerHTML = "<p style='color:red;'>Could not read the time line.</p>";
        return;
    }

    const startTime = timeMatch[1].replace('.', ':');
    const endTime = timeMatch[2].replace('.', ':');

    const [sh, sm] = startTime.split(':').map(Number);
    const [eh, em] = endTime.split(':').map(Number);

    const startDate = new Date(year, month, day, sh, sm);
    const endDate = new Date(year, month, day, eh, em);

    function fmt(d) {
        return d.toISOString().replace(/[-:]/g, "").split('.')[0] + "Z";
    }

    const google =
        "https://calendar.google.com/calendar/render?action=TEMPLATE" +
        "&text=" + encodeURIComponent(fullTitle) +
        "&dates=" + fmt(startDate) + "/" + fmt(endDate) +
        "&details=" + encodeURIComponent("Speaker: " + speaker) +
        "&location=" + encodeURIComponent("The Embassy Theatre, 10 Kent Terrace");

    const outlook =
        "https://outlook.live.com/calendar/0/deeplink/compose?subject=" +
        encodeURIComponent(fullTitle) +
        "&body=" + encodeURIComponent("Speaker: " + speaker) +
        "&startdt=" + startDate.toISOString() +
        "&enddt=" + endDate.toISOString() +
        "&location=" + encodeURIComponent("The Embassy Theatre, 10 Kent Terrace");

    const apple =
        "data:text/calendar;charset=utf8," +
        encodeURIComponent(
`BEGIN:VCALENDAR
VERSION:2.0
BEGIN:VEVENT
SUMMARY:${fullTitle}
DTSTART:${fmt(startDate)}
DTEND:${fmt(endDate)}
LOCATION:The Embassy Theatre, 10 Kent Terrace
DESCRIPTION:Speaker: ${speaker}
END:VEVENT
END:VCALENDAR`
        );

    const ics =
`BEGIN:VCALENDAR
VERSION:2.0
BEGIN:VEVENT
SUMMARY:${fullTitle}
DTSTART:${fmt(startDate)}
DTEND:${fmt(endDate)}
LOCATION:The Embassy Theatre, 10 Kent Terrace
DESCRIPTION:Speaker: ${speaker}
END:VEVENT
END:VCALENDAR`;

    const icsBlob = new Blob([ics], { type: "text/calendar" });
    const icsUrl = URL.createObjectURL(icsBlob);

    document.getElementById("output").innerHTML = `
        <a class="link" href="${google}" target="_blank">Add to Google Calendar</a>
        <a class="link" href="${outlook}" target="_blank">Add to Outlook Calendar</a>
        <a class="link" href="${apple}" download="event.ics">Add to Apple Calendar</a>

        <div class="small">
            <a href="${icsUrl}" download="u3a-event.ics">Download .ics file (optional)</a>
        </div>
    `;
}
</script>

</body>
</html>
