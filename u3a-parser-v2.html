<script>
function parse() {
    const input = document.getElementById("input").value;

    // Split into lines but KEEP blank lines
    const rawLines = input.split('\n').map(l => l.trim());

    // Extract the four meaningful lines in your standard format
    const dateLine = rawLines.find(l => l !== '');
    const timeLine = rawLines.slice(rawLines.indexOf(dateLine) + 1).find(l => l !== '');
    const title = rawLines.slice(rawLines.indexOf(timeLine) + 1).find(l => l !== '');
    const speaker = rawLines.slice(rawLines.indexOf(title) + 1).find(l => l !== '');

    // --- Parse date ---
    const dateMatch = dateLine.match(/(\d{1,2})\s+([A-Za-z]+)\s+(\d{4})/);
    if (!dateMatch) {
        document.getElementById("output").innerHTML = "<p style='color:red;'>Could not read the date line.</p>";
        return;
    }

    const day = dateMatch[1];
    const monthName = dateMatch[2];
    const year = dateMatch[3];

    const monthMap = {
        January: 0, February: 1, March: 2, April: 3, May: 4, June: 5,
        July: 6, August: 7, September: 8, October: 9, November: 10, December: 11
    };

    const month = monthMap[monthName];
    const dateObj = new Date(year, month, day);

    // --- Parse time ---
    const timeMatch = timeLine.match(/(\d{1,2}[:\.]\d{2})\s*[\u002D\u2010-\u2015]\s*(\d{1,2}[:\.]\d{2})/);
    if (!timeMatch) {
        document.getElementById("output").innerHTML = "<p style='color:red;'>Could not read the time line.</p>";
        return;
    }

    const startTime = timeMatch[1].replace('.', ':');
    const endTime = timeMatch[2].replace('.', ':');

    const [sh, sm] = startTime.split(':').map(Number);
    const [eh, em] = endTime.split(':').map(Number);

    const startDate = new Date(year, month, day, sh, sm);
    const endDate = new Date(year, month, day, eh, em);

    // --- Format for Google Calendar ---
    function fmt(d) {
        return d.toISOString().replace(/[-:]/g, "").split('.')[0] + "Z";
    }

    const gcal =
        "https://calendar.google.com/calendar/render?action=TEMPLATE" +
        "&text=" + encodeURIComponent(title) +
        "&dates=" + fmt(startDate) + "/" + fmt(endDate) +
        "&details=" + encodeURIComponent("Speaker: " + speaker) +
        "&location=" + encodeURIComponent("The Embassy Theatre, 10 Kent Terrace");

    // --- Build ICS file ---
    const ics =
`BEGIN:VCALENDAR
VERSION:2.0
BEGIN:VEVENT
SUMMARY:${title}
DTSTART:${fmt(startDate)}
DTEND:${fmt(endDate)}
LOCATION:The Embassy Theatre, 10 Kent Terrace
DESCRIPTION:Speaker: ${speaker}
END:VEVENT
END:VCALENDAR`;

    const icsBlob = new Blob([ics], { type: "text/calendar" });
    const icsUrl = URL.createObjectURL(icsBlob);

    // --- Output ---
    document.getElementById("output").innerHTML = `
        <p><strong>Google Calendar link:</strong><br>
        <a href="${gcal}" target="_blank">Add to Google Calendar</a></p>

        <p><strong>Download ICS file:</strong><br>
        <a href="${icsUrl}" download="u3a-event.ics">Download .ics file</a></p>

        <p><strong>Email snippet:</strong><br>
        <textarea rows="4" style="width:100%;">${title} — ${speaker}
${dateLine}, ${startTime}–${endTime}
The Embassy Theatre, 10 Kent Terrace</textarea></p>
    `;
}
</script>
